services:
  - type: web
    name: magic-music-web
    env: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_ENV
        value: production
      - key: PRICE_RUB
        value: 990
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_DOMAIN
        sync: false
      - key: BASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Magic Music
      - key: SMTP_TIMEOUT_SECONDS
        value: 20
      - key: MAGIC_LINK_STUB_MODE
        value: false
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_TAX_SYSTEM_CODE
        sync: false
      - key: YOOKASSA_VAT_CODE
        sync: false
      - key: YOOKASSA_RECEIPT_EMAIL
        sync: false
