services:
  - type: web
    name: magic-music-web
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8

      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: Magic Music
      - key: BASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true

      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: BACKGROUND_QUEUE_NAME
        value: default
      - key: BACKGROUND_JOBS_SYNC_MODE
        value: false

      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
      - key: AUDIO_TRANSCRIBE_LANGUAGE
        value: ru

      - key: SUNO_API_KEY
        sync: false
      - key: SUNO_API_BASE_URL
        value: https://api.sunoapi.org
      - key: SUNO_MODEL
        value: V5
      - key: SUNO_STUB_MODE
        value: false
      - key: SUNO_STUB_DELAY_SECONDS
        value: 12
      - key: SUNO_STUB_AUDIO_URL
        sync: false
      - key: SUNO_REQUEST_TIMEOUT_SECONDS
        value: 60
      - key: SUNO_CALLBACK_TOKEN
        sync: false

      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: YOOKASSA_TAX_SYSTEM_CODE
        sync: false
      - key: YOOKASSA_VAT_CODE
        sync: false
      - key: YOOKASSA_RECEIPT_EMAIL
        sync: false

      - key: METRICA_COUNTER_ID
        sync: false

      - key: SUPPORT_TG_URL
        value: https://t.me/mikhailantonov19
      - key: SUPPORT_MAX_URL
        value: https://max.ru/u/f9LHodD0cOKg36L-baFKeBJquxSx5xydupa2AYOKdl7BUFipfVYS5FVVV80

      - key: PRICE_RUB
        value: 990
      - key: UPLOADS_DIR
        value: /var/data/musicmemoire/uploads
      - key: MAX_VOICE_FILE_MB
        value: 25
      - key: MAX_SONG_FILE_MB
        value: 80

      - key: OBJECT_STORAGE_BUCKET
        sync: false
      - key: OBJECT_STORAGE_ENDPOINT_URL
        sync: false
      - key: OBJECT_STORAGE_REGION
        value: auto
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: OBJECT_STORAGE_PREFIX
        value: musicmemoire
      - key: OBJECT_STORAGE_FORCE_PATH_STYLE
        value: false

      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Magic Music
      - key: SMTP_TIMEOUT_SECONDS
        value: 20

      - key: MAGIC_LINK_TTL_MINUTES
        value: 30
      - key: MAGIC_LINK_STUB_MODE
        value: false

      - key: MAGIC_LINK_EMAIL_LIMIT_PER_HOUR
        value: 5
      - key: MAGIC_LINK_IP_LIMIT_PER_HOUR
        value: 12
      - key: QUESTIONNAIRE_MAGIC_LINK_ORDER_LIMIT_PER_HOUR
        value: 3
      - key: VOICE_UPLOAD_LIMIT_PER_ORDER_PER_DAY
        value: 5
      - key: VOICE_RETRANSCRIBE_LIMIT_PER_ORDER_PER_HOUR
        value: 3
      - key: SONG_START_LIMIT_PER_ORDER_PER_DAY
        value: 6

      - key: ADMIN_TOKEN
        sync: false

  - type: worker
    name: magic-music-worker
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m app.worker"
    autoDeploy: true
