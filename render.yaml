services:
  - type: web
    name: musicmemoire-web
    env: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_ENV
        value: production
      - key: PRICE_RUB
        value: 990
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_DOMAIN
        sync: false
      - key: BASE_URL
        sync: false
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: YOOKASSA_RECEIPT_EMAIL
        sync: false
