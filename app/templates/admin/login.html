{% extends "base.html" %}

{% block content %}
<section class="section questionnaire-stage admin-login-stage">
  <div class="container narrow admin-shell">
    <div class="questionnaire-shell admin-login-shell">
      <div class="questionnaire-stack">
        <p class="eyebrow">Админка</p>

        {% if error %}
          <div class="notice notice-error">{{ error }}</div>
        {% endif %}

        <form class="form-card admin-login-form" method="post" action="/admin/login">
          <input
            id="token"
            name="token"
            type="password"
            class="text-input"
            placeholder="Введите токен"
            required
          />

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Войти</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
