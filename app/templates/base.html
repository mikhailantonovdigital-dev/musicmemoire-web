<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page_title or "Music Memoire" }}</title>
  <meta
    name="description"
    content="Music Memoire: персональные песни в подарок. Расскажите историю текстом или голосом, получите 2 версии текста бесплатно и закажите готовую песню."
  />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body class="theme-dark-premium{% if request.url.path == '/' %} page-home{% endif %}{% if request.url.path in ['/', '/portfolio', '/how-it-works', '/reviews'] %} page-marketing-screen{% endif %}">
  <div class="page-bg page-bg-dark"></div>
  <div class="page-noise"></div>

  {% set path = request.url.path %}

  <header class="site-header site-header-upgraded site-header-dark site-header-horizontal">
    <div class="container header-shell">
      <a href="/" class="brand brand-dark">
        <span class="logo-badge">MM</span>
        <span class="brand-copy">
          <span class="logo-text">Music Memoire</span>
          <span class="brand-subtitle">Персональные песни в подарок</span>
        </span>
      </a>

      <nav class="nav nav-upgraded nav-dark nav-horizontal">
        <a class="{% if path == '/' %}is-active{% endif %}" href="/">Главная</a>
        <a class="{% if path == '/portfolio' %}is-active{% endif %}" href="/portfolio">Портфолио</a>
        <a class="{% if path == '/how-it-works' %}is-active{% endif %}" href="/how-it-works">Как это работает</a>
        <a class="{% if path == '/reviews' %}is-active{% endif %}" href="/reviews">Отзывы клиентов</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer site-footer-minimal site-footer-dark">
    <div class="container footer-bottom footer-bottom-minimal">
      <p>© Music Memoire</p>
    </div>
  </footer>

  <script src="/static/js/app.js"></script>
</body>
</html>
