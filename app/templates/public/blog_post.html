{% extends "base.html" %}

{% block content %}
<section class="section blog-page-head">
  <div class="container narrow">
    <p class="eyebrow">Блог</p>
    <h1>{{ post.title }}</h1>
    <p class="lead-small">{{ post.excerpt }}</p>
  </div>
</section>

<section class="section">
  <div class="container narrow">
    <article class="article-card">
      {% for paragraph in post.body %}
        <p>{{ paragraph }}</p>
      {% endfor %}
    </article>

    <div class="form-actions" style="margin-top: 24px;">
      <a class="btn btn-secondary" href="/blog">Назад в блог</a>
      <a class="btn btn-primary" href="/questionnaire/">Хочу песню</a>
    </div>
  </div>
</section>
{% endblock %}
