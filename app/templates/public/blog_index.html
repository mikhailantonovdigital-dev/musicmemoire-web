{% extends "base.html" %}

{% block content %}
<section class="section blog-page-head">
  <div class="container narrow">
    <p class="eyebrow">Блог</p>
    <h1>Статьи Magic Moment</h1>
    <p class="lead-small">
      Статический блог для MVP: полезные статьи про идеи подарков и персональные песни.
    </p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="blog-grid blog-grid-full">
      {% for post in posts %}
        <article class="blog-card">
          <h2><a href="/blog/{{ post.slug }}">{{ post.title }}</a></h2>
          <p>{{ post.excerpt }}</p>
          <a class="blog-link" href="/blog/{{ post.slug }}">Читать статью</a>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
