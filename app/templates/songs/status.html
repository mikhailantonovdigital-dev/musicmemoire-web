{% extends "base.html" %}

{% block content %}
<section class="section">
  <div class="container narrow">
    <p class="eyebrow">Генерация песни</p>
    <h1>{{ order.order_number }}</h1>

    {% include "songs/_status_content.html" %}
  </div>
</section>

<script>
  (function () {
    var pollHandle = null;

    function scheduleNextPoll() {
      window.clearTimeout(pollHandle);
      pollHandle = window.setTimeout(runPoll, 5000);
    }

    function runPoll() {
      var container = document.getElementById("song-status-content");
      if (!container || container.dataset.songRunning !== "true") {
        return;
      }

      fetch(container.dataset.pollUrl, {
        headers: {
          "X-Requested-With": "fetch"
        },
        credentials: "same-origin"
      })
        .then(function (response) {
          if (!response.ok) {
            throw new Error("song status request failed");
          }
          return response.text();
        })
        .then(function (html) {
          container.outerHTML = html;
          var updatedContainer = document.getElementById("song-status-content");
          if (updatedContainer && updatedContainer.dataset.songRunning === "true") {
            scheduleNextPoll();
          }
        })
        .catch(function () {
          scheduleNextPoll();
        });
    }

    if (document.getElementById("song-status-content")?.dataset.songRunning === "true") {
      scheduleNextPoll();
    }
  })();
</script>
{% endblock %}
