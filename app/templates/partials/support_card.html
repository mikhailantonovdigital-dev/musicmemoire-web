<div class="panel-card support-card support-card-standalone">
  <div class="support-card-copy">
    <div class="mini-label">Поддержка</div>
    <strong>{{ support_title or "Нужна помощь?" }}</strong>
    <p>
      {{ support_text or "Если что-то непонятно или что-то пошло не так, отправьте обращение через форму поддержки — поможем разобраться по заказу и статусу." }}
    </p>
  </div>

  <div class="support-card-actions">
    <a
      href="{{ support_href or '/support' }}"
      class="btn btn-secondary"
      data-support-link="support-form"
    >Открыть поддержку</a>
  </div>
</div>
